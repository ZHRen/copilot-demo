spring.application.name=copilot-demo
server.port=8080

# Multipart upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Storage configuration: local | nas | obs
app.storage.type=local
app.storage.local.base-dir=uploads
app.storage.nas.base-dir=
app.storage.obs.endpoint=
app.storage.obs.access-key=
app.storage.obs.secret-key=
app.storage.obs.bucket-name=

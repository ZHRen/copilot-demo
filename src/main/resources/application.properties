spring.application.name=copilot-demo
server.port=8080

# Multipart upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Storage configuration: local | nas | obs
app.storage.type=local
# local.base-dir is also used by the download endpoint; keep both in sync
app.storage.local.base-dir=uploads
app.storage.nas.base-dir=
# OBS credentials should be supplied via environment variables, not hardcoded here
app.storage.obs.endpoint=${APP_STORAGE_OBS_ENDPOINT:}
app.storage.obs.access-key=${APP_STORAGE_OBS_ACCESS_KEY:}
app.storage.obs.secret-key=${APP_STORAGE_OBS_SECRET_KEY:}
app.storage.obs.bucket-name=${APP_STORAGE_OBS_BUCKET_NAME:}
